name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build
      - name: Build
        run: |
          cd build
          cp -r ../userpatches .
          # 去掉 SKIP_IMAGE_CUSTOMIZATION，我们改用 IGNORE_EXCEPTIONS=yes 
          # 这样它会尝试打包，即便有错误也会继续输出
          sudo ./compile.sh BOARD=vontar-h618 BRANCH=current RELEASE=trixie \
            BUILD_DESKTOP=no BUILD_MINIMAL=yes KERNEL_CONFIGURE=no \
            IGNORE_EXCEPTIONS=yes
      - uses: actions/upload-artifact@v4
        with:
          name: all-build-output
          # 上传整个 output 目录，看看里面到底生成了什么
          path: build/output/
