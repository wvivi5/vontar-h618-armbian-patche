name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build
      - name: Build
        run: |
          cd build
          cp -r ../userpatches .
          # 核心修改：使用 IGNORE_EXCEPTIONS=yes 和跳过镜像自定义脚本，
          # 这样即使安装包出错，它也会继续打包，绝不中途退出！
          sudo ./compile.sh BOARD=vontar-h618 BRANCH=current RELEASE=trixie \
            BUILD_DESKTOP=no BUILD_MINIMAL=yes KERNEL_CONFIGURE=no \
            IGNORE_EXCEPTIONS=yes SKIP_IMAGE_CUSTOMIZATION=yes
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: build/output/images/*.img.xz
