name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build
      - name: Build
        run: |
          cd build
          # 将 userpatches 复制到 build 目录下，而不是链接
          cp -r ../userpatches .
          # 使用最基础的 build 参数，不加任何导致冲突的复杂选项
          ./compile.sh BOARD=vontar-h618 BRANCH=current RELEASE=trixie BUILD_DESKTOP=no BUILD_MINIMAL=yes KERNEL_CONFIGURE=no
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: build/output/images/*.img.xz
