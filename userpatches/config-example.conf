# Example Armbian build config for Vontar H618/H616-class TV box.
# Copy or reference this from an Armbian build checkout as needed.

BOARD=vontar-h618
BRANCH=current
RELEASE=bookworm
KERNEL_CONFIGURE=no
BUILD_DESKTOP=no
BUILD_MINIMAL=no
INSTALL_HEADERS=yes
SHARE_LOGS=no

# Optional for desktop validation builds:
# BUILD_DESKTOP=yes
